<style>
:root{
  --g1:#2d5016;--g2:#3d6b1e;--g3:#5a9030;--g4:#7ab84a;
  --amber:#c8820a;--amber-l:#f5c842;--amber-pale:#fff8e8;
  --cream:#faf8f2;--cream2:#f2ebe0;--cream3:#e8dfc8;
  --t1:#1e1e1e;--t2:#4a4535;--t3:#9a9080;
  --bd:rgba(0,0,0,0.08);--sh:0 2px 16px rgba(0,0,0,0.07);
  --r:16px;--rs:10px;
  --orange:#c45520;--teal:#157a5a;--purple:#5040b0;
  --pink:#b84070;--blue:#1a5fa8;--crimson:#8a2020;--gold:#a06010;
  --star:#d4a012;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Noto Sans JP',sans-serif;background:var(--cream);color:var(--t1)}

/* ===== APP SHELL ===== */
#app{
  display:flex;flex-direction:column;
  height:100dvh;max-width:480px;
  margin:0 auto;background:var(--cream);
  box-shadow:0 0 60px rgba(0,0,0,0.18);
  overflow:hidden;position:relative;
}

/* ===== HEADER ===== */
.hdr{
  background:linear-gradient(160deg,#1e3a08 0%,#2d5016 50%,#3a6a1a 100%);
  padding:calc(14px + var(--safe-t)) 16px 0;
  flex-shrink:0;position:relative;overflow:hidden;
}
/* 背景テクスチャ */
.hdr::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(circle at 15% 50%,rgba(255,255,255,0.04) 0%,transparent 40%),
    radial-gradient(circle at 85% 20%,rgba(245,200,66,0.07) 0%,transparent 35%);
}
.hdr-top{
  display:flex;align-items:center;
  justify-content:space-between;
  margin-bottom:10px;position:relative;z-index:1;
}
.hdr-brand{display:flex;align-items:center;gap:10px}
.hdr-icon{width:44px;height:44px;flex-shrink:0}
.hdr-text{}
.hdr-title{
  font-family:'Noto Serif JP',serif;
  font-size:19px;font-weight:700;color:#fff;
  letter-spacing:.06em;line-height:1.2;
}
.hdr-en{font-size:10px;color:rgba(255,255,255,0.45);letter-spacing:.12em;margin-top:1px}
.hdr-btns{display:flex;gap:7px}
.hbtn{
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.22);
  color:#fff;border-radius:22px;
  padding:8px 14px;font-size:12px;font-weight:500;
  cursor:pointer;font-family:'Noto Sans JP',sans-serif;
  display:flex;align-items:center;gap:5px;
  transition:all .15s;white-space:nowrap;
}
.hbtn:active{background:rgba(255,255,255,0.28)}
.hbtn.accent{background:rgba(245,200,66,0.22);border-color:rgba(245,200,66,0.4);color:var(--amber-l)}
.hdr-sub{
  font-size:10.5px;color:rgba(255,255,255,0.42);
  padding-bottom:11px;position:relative;z-index:1;
}

/* ===== TABS ===== */
.tabs{
  background:linear-gradient(160deg,#1e3a08 0%,#2d5016 50%,#3a6a1a 100%);
  padding:0 12px 11px;
  display:flex;gap:6px;
  overflow-x:auto;scrollbar-width:none;flex-shrink:0;
}
.tabs::-webkit-scrollbar{display:none}
.tbtn{
  flex-shrink:0;padding:5px 13px;
  font-size:11.5px;font-weight:500;
  border-radius:22px;
  border:1.5px solid rgba(255,255,255,0.2);
  background:transparent;color:rgba(255,255,255,0.6);
  cursor:pointer;font-family:'Noto Sans JP',sans-serif;
  transition:all .15s;
}
.tbtn.active{
  background:#fff;color:var(--g1);
  border-color:#fff;font-weight:700;
}
.cnt{
  display:inline-block;
  background:rgba(255,255,255,0.18);
  font-size:10px;padding:0 5px;
  border-radius:8px;margin-left:3px;
}
.tbtn.active .cnt{background:var(--cream2);color:var(--g2)}

/* ===== SCROLL ===== */
.scroll{
  flex:1;overflow-y:auto;
  padding:14px 12px calc(24px + var(--safe-b));
  -webkit-overflow-scrolling:touch;
}

/* ===== LEGEND ===== */
.legend{
  display:flex;gap:6px;flex-wrap:wrap;
  margin-bottom:14px;padding:10px 13px;
  background:#fff;border-radius:var(--rs);
  border:1px solid var(--bd);
  box-shadow:var(--sh);
}
.lgnd-ttl{font-size:10px;color:var(--t3);width:100%}
.lb{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px}
.lk{background:#e8f5e0;color:#2d6a14;border:1px solid #a8d878}
.lh{background:#e0eef8;color:#1a4f8a;border:1px solid #78aae0}
.lboth{background:#ede8f8;color:#3830a0;border:1px solid #a898e8}
.ln{background:#fff3e0;color:#a06010;border:1px solid #f0b840}

/* ===== CATEGORY ===== */
.cat-sec{margin-bottom:22px}
.cat-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.cat-badge{font-size:11px;font-weight:700;padding:4px 14px;border-radius:20px;color:#fff;letter-spacing:.03em}
.cat-desc{
  font-size:11.5px;color:var(--t2);line-height:1.75;
  margin-bottom:11px;padding:9px 12px;
  background:rgba(0,0,0,0.025);
  border-radius:var(--rs);
  border-left:3px solid var(--cream3);
}

/* ===== ATTENTION BANNER ===== */
.att{
  background:linear-gradient(135deg,#231000 0%,#5a2800 60%,#7a3800 100%);
  border-radius:var(--r);padding:14px;
  margin-bottom:13px;
  display:flex;align-items:center;gap:12px;
  box-shadow:0 4px 20px rgba(100,40,0,0.25);
}
.att-ico{font-size:30px;flex-shrink:0}
.att h3{color:var(--amber-l);font-size:13.5px;font-weight:700}
.att p{color:rgba(255,255,255,0.6);font-size:11px;margin-top:3px;line-height:1.55}

/* ===== CARD ===== */
.card{
  background:#fff;border-radius:var(--r);
  border:1px solid var(--bd);
  padding:15px;margin-bottom:11px;
  box-shadow:var(--sh);
}
.card-hdr{display:flex;align-items:flex-start;gap:11px;margin-bottom:13px}
.onion-svg{width:52px;height:52px;flex-shrink:0}
.cmeta{flex:1;min-width:0}
.cnrow{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.cname{font-size:15px;font-weight:700;color:var(--t1)}
.ob{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px}
.ok{background:#e8f5e0;color:#2d6a14;border:1px solid #a8d878}
.oh{background:#e0eef8;color:#1a4f8a;border:1px solid #78aae0}
.oboth{background:#ede8f8;color:#3830a0;border:1px solid #a898e8}
.on{background:#fff3e0;color:#a06010;border:1px solid #f0b840}
.cmkr{font-size:11px;color:var(--t3);margin-top:3px}
.tagrow{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
.tag{
  font-size:10.5px;padding:2px 8px;border-radius:6px;
  background:var(--cream2);color:var(--t2);
  border:1px solid rgba(0,0,0,0.07);
}

/* ===== CALENDAR ===== */
.cal{margin-bottom:11px}
.cl-lbl{font-size:10px;color:var(--t3);margin-bottom:4px}
.cl-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:2px}
.cl-m{font-size:8.5px;color:var(--t3);text-align:center;padding-bottom:2px}
.cl-b{height:9px;border-radius:2px;background:#eee}
.cs{background:var(--orange)}
.ct{background:var(--teal)}
.ch{background:var(--purple)}
.cl-leg{display:flex;gap:12px;margin-top:6px}
.cli{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--t2)}
.cld{width:9px;height:9px;border-radius:2px;flex-shrink:0}

/* ===== FEAT ===== */
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:11px}
.fbox{background:var(--cream2);border-radius:var(--rs);padding:8px 11px;text-align:center}
.flbl{font-size:10px;color:var(--t3)}
.fval{font-size:12px;font-weight:700;color:var(--t1);margin-top:2px}
.rrow{display:flex;gap:16px;margin-bottom:8px}
.stars{color:var(--star);font-size:12px;letter-spacing:1px}
.cnote{font-size:11.5px;color:var(--t2);line-height:1.75}

/* ===== MODALS ===== */
.ov{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.55);z-index:300;
  align-items:flex-end;justify-content:center;
  max-width:480px;margin:0 auto;
}
.ov.open{display:flex}
.sheet{
  background:#fff;border-radius:22px 22px 0 0;
  width:100%;max-height:93dvh;
  overflow-y:auto;
  padding:0 17px calc(30px + var(--safe-b));
}
.sh-hnd{
  width:42px;height:4px;background:#ddd;
  border-radius:2px;margin:14px auto 17px;
}
.sh-ttl{font-size:17px;font-weight:700;margin-bottom:17px;color:var(--t1)}
.fg{margin-bottom:14px}
.flb{font-size:12px;font-weight:500;color:var(--t2);margin-bottom:5px;display:block}
.fi,.fs,.fta{
  width:100%;padding:11px 13px;
  border:1.5px solid var(--bd);border-radius:var(--rs);
  font-size:14px;font-family:'Noto Sans JP',sans-serif;
  background:#fff;color:var(--t1);
  outline:none;transition:border-color .15s;
  -webkit-appearance:none;
}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--g3)}
.fta{resize:vertical;min-height:75px;line-height:1.65}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.btnp{
  width:100%;padding:14px;
  background:var(--g1);color:#fff;border:none;
  border-radius:var(--rs);font-size:15px;font-weight:700;
  font-family:'Noto Sans JP',sans-serif;
  cursor:pointer;margin-top:7px;transition:background .15s;
}
.btnp:active{background:var(--g2)}
.btns{
  width:100%;padding:12px;background:transparent;
  color:var(--t2);border:1.5px solid var(--bd);
  border-radius:var(--rs);font-size:14px;
  font-family:'Noto Sans JP',sans-serif;
  cursor:pointer;margin-top:9px;
}

/* ===== TOAST ===== */
.toast{
  position:fixed;
  top:calc(20px + var(--safe-t));left:50%;
  transform:translateX(-50%) translateY(-90px);
  background:var(--g1);color:#fff;
  padding:11px 22px;border-radius:32px;
  font-size:13px;font-weight:500;z-index:999;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap;pointer-events:none;
  box-shadow:0 4px 20px rgba(0,0,0,0.2);
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ===== EMPTY ===== */
.empty{text-align:center;padding:48px 20px;color:var(--t3)}
.empty .ei{font-size:48px;margin-bottom:12px}
.empty p{font-size:13px;line-height:1.75}

/* ===== DESKTOP ===== */
@media(min-width:500px){
  body{background:#d8d0c0;display:flex;align-items:center;justify-content:center;height:100vh}
  #app{height:min(900px,96dvh);border-radius:26px}
  .ov{border-radius:26px;overflow:hidden}
}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-top">
      <div class="hdr-brand">
        <!-- アプリアイコン（かわいいSVG玉葱キャラ） -->
        <svg class="hdr-icon" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
          <!-- 丸いグリーン背景 -->
          <circle cx="22" cy="22" r="21" fill="#3d7020"/>
          <!-- 光沢 -->
          <ellipse cx="14" cy="10" rx="7" ry="4" fill="rgba(255,255,255,0.12)"/>
          <!-- 葉っぱ（左） -->
          <path d="M22 17 Q17 9 15 4" stroke="#7acc40" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <!-- 葉っぱ（右） -->
          <path d="M22 17 Q27 9 29 4" stroke="#7acc40" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <!-- 葉っぱ（中央） -->
          <path d="M22 17 Q22 10 22 5" stroke="#5ab030" stroke-width="2" fill="none" stroke-linecap="round"/>
          <!-- 玉ねぎ本体（外側） -->
          <ellipse cx="22" cy="30" rx="14" ry="12" fill="#f5c842"/>
          <!-- 玉ねぎ本体（中層） -->
          <ellipse cx="22" cy="29" rx="11.5" ry="10" fill="#e8a810" opacity="0.6"/>
          <!-- 玉ねぎの縦線（模様） -->
          <path d="M14 22 Q13 30 14.5 38" stroke="#c88a08" stroke-width="1" fill="none" opacity="0.5"/>
          <path d="M30 22 Q31 30 29.5 38" stroke="#c88a08" stroke-width="1" fill="none" opacity="0.5"/>
          <!-- 顔：目（左） -->
          <ellipse cx="18" cy="28" rx="2" ry="2.2" fill="#3a2000"/>
          <!-- 顔：目（右） -->
          <ellipse cx="26" cy="28" rx="2" ry="2.2" fill="#3a2000"/>
          <!-- 顔：目のハイライト -->
          <circle cx="18.8" cy="27.2" r="0.7" fill="#fff"/>
          <circle cx="26.8" cy="27.2" r="0.7" fill="#fff"/>
          <!-- 顔：笑顔 -->
          <path d="M18.5 33 Q22 36 25.5 33" stroke="#3a2000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <!-- ほっぺ（赤み） -->
          <ellipse cx="15.5" cy="32" rx="2.5" ry="1.5" fill="#ff8888" opacity="0.4"/>
          <ellipse cx="28.5" cy="32" rx="2.5" ry="1.5" fill="#ff8888" opacity="0.4"/>
          <!-- 根っこ -->
          <line x1="19" y1="41.5" x2="18" y2="43" stroke="#a87820" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="22" y1="42" x2="22" y2="44" stroke="#a87820" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="25" y1="41.5" x2="26" y2="43" stroke="#a87820" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        <div class="hdr-text">
          <div class="hdr-title">玉葱品種図鑑</div>
          <div class="hdr-en">TAMANEGI ZUKAN</div>
        </div>
      </div>
      <div class="hdr-btns">
        <button class="hbtn accent" onclick="openAdd()">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6.5 1v11M1 6.5h11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          品種を追加
        </button>
      </div>
    </div>
    <div class="hdr-sub" id="hdr-sub">読み込み中...</div>
  </div>

  <!-- TABS -->
  <div class="tabs" id="tabs"></div>

  <!-- SCROLL -->
  <div class="scroll" id="scroll"></div>

</div>

<!-- ========== ADD MODAL ========== -->
<div class="ov" id="ov-add">
  <div class="sheet">
    <div class="sh-hnd"></div>
    <div class="sh-ttl">✏️ 新しい品種を追加</div>
    <div class="fg">
      <label class="flb">品種名 *</label>
      <input class="fi" id="fn" placeholder="例：泉州中高黄" type="text">
    </div>
    <div class="frow">
      <div class="fg">
        <label class="flb">種苗会社・育成元</label>
        <input class="fi" id="fm" placeholder="例：タキイ種苗" type="text">
      </div>
      <div class="fg">
        <label class="flb">早晩性 *</label>
        <select class="fs" id="fc">
          <option value="chokugokuwase">超極早生</option>
          <option value="gokuwase">極早生</option>
          <option value="wase">早生</option>
          <option value="nakate" selected>中生</option>
          <option value="okute">晩生</option>
          <option value="red">赤玉ねぎ</option>
          <option value="attention">⭐ 注目品種</option>
        </select>
      </div>
    </div>
    <div class="frow">
      <div class="fg">
        <label class="flb">産地</label>
        <select class="fs" id="fo">
          <option value="kyushu">九州</option>
          <option value="hyogo">淡路島</option>
          <option value="both">九州・淡路島</option>
          <option value="new">新品種</option>
        </select>
      </div>
      <div class="fg">
        <label class="flb">平均球重</label>
        <input class="fi" id="fw" placeholder="例：300g前後" type="text">
      </div>
    </div>
    <div class="frow">
      <div class="fg">
        <label class="flb">播種月（例:8,9）</label>
        <input class="fi" id="fsow" type="text" inputmode="numeric">
      </div>
      <div class="fg">
        <label class="flb">定植月（例:11,12）</label>
        <input class="fi" id="ftr" type="text" inputmode="numeric">
      </div>
    </div>
    <div class="frow">
      <div class="fg">
        <label class="flb">収穫月（例:5,6）</label>
        <input class="fi" id="fhv" type="text" inputmode="numeric">
      </div>
      <div class="fg">
        <label class="flb">貯蔵期間</label>
        <input class="fi" id="fst" placeholder="例：〜12月" type="text">
      </div>
    </div>
    <div class="fg">
      <label class="flb">タグ（カンマ区切り）</label>
      <input class="fi" id="ftg" placeholder="例：病気に強い,大玉,甘み強い" type="text">
    </div>
    <div class="fg">
      <label class="flb">特徴・メモ</label>
      <textarea class="fta" id="fnt" placeholder="品種の特徴、栽培ポイントなど"></textarea>
    </div>
    <button class="btnp" onclick="doAdd()">図鑑に追加する</button>
    <button class="btns" onclick="closeOv('ov-add')">キャンセル</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   DATA
============================================================ */
const COLORS = {
  chokugokuwase:'#b84070',gokuwase:'#c45520',wase:'#157a5a',
  nakate:'#1a5fa8',okute:'#5040b0',red:'#8a2020',attention:'#a06010'
};
const CNAMES = {
  chokugokuwase:'超極早生',gokuwase:'極早生',wase:'早生',
  nakate:'中生',okute:'晩生',red:'赤玉ねぎ',attention:'⭐ 注目品種'

const strs = n => '★'.repeat(n) + '☆'.repeat(5 - n);

// カテゴリ別玉葱SVG（かわいいキャラ）

    <circle cx="31.8" cy="31.2" r="0.7" fill="#fff"/>

    <!-- ほっぺ -->

    <ellipse cx="35" cy="36" rx="2.5" ry="1.5" fill="#ff7777" opacity="0.35"/>
    <!-- 根っこ -->
    <line x1="22" y1="47.5" x2="21" y2="50" stroke="#8a6010" stroke-width="1.1" stroke-linecap="round"/>

}

function shadeColor(hex, pct) {
  // 簡易的な色の明度調整（使用箇所限定）
  return hex; // そのまま返す（本体色で十分）
}

function calHtml(s, t, h) {
  let m = '', b = '';
  for (let i = 1; i <= 12; i++) {
    m += `<div class="cl-m">${i}</div>`;
    let c = 'cl-b';
    if (s.includes(i)) c += ' cs';
    else if (t.includes(i)) c += ' ct';
    else if (h.includes(i)) c += ' ch';
    b += `<div class="${c}"></div>`;
  }
  return `<div class="cal">
    <div class="cl-lbl">作付けカレンダー（月）</div>
    <div class="cl-grid">${m}</div>
    <div class="cl-grid" style="margin-top:2px">${b}</div>
    <div class="cl-leg">
      <div class="cli"><div class="cld" style="background:#c45520"></div>播種</div>
      <div class="cli"><div class="cld" style="background:#157a5a"></div>定植</div>
      <div class="cli"><div class="cld" style="background:#5040b0"></div>収穫</div>
    </div>
  </div>`;
}

function cardHtml(v) {
  const isRed = v.cat === 'red';
  const color = COLORS[v.cat] || '#888';
  return `<div class="card">
    <div class="card-hdr">
      ${onionChar(color, isRed)}
      <div class="cmeta">
        <div class="cnrow">
          <span class="cname">${v.name}</span>
          <span class="ob ${OBC[v.origin] || 'on'}">${OBL[v.origin] || '新品種'}</span>
        </div>
        <div class="cmkr">${v.maker || '—'}</div>
        <div class="tagrow">${(v.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
    </div>
    ${calHtml(v.sow || [], v.trans || [], v.harv || [])}
    <div class="fg2">
      <div class="fbox"><div class="flbl">平均球重</div><div class="fval">${v.wt || '—'}</div></div>
      <div class="fbox"><div class="flbl">貯蔵期間</div><div class="fval">${v.stor || '—'}</div></div>
    </div>
    <div class="rrow">
      <div><div class="flbl">食味</div><div class="stars">${strs(v.taste || 3)}</div></div>
      <div><div class="flbl">作りやすさ</div><div class="stars">${strs(v.easy || 3)}</div></div>
    </div>
    <div class="cnote">${v.note || ''}</div>
  </div>`;
}

/* ============================================================
   RENDER
============================================================ */
function render() {
  // TABS
  const ts = [{id:'all',lbl:'すべて'}, ...CATS.map(c => ({id:c, lbl:CNAMES[c]}))];
  document.getElementById('tabs').innerHTML = ts.map(t => {
    const n = t.id === 'all' ? DB.length : DB.filter(v => v.cat === t.id).length;
    return `<button class="tbtn${t.id === tab ? ' active' : ''}" onclick="setTab('${t.id}')">${t.lbl}<span class="cnt">${n}</span></button>`;
  }).join('');

  // LEGEND
  const leg = `<div class="legend">
    <div class="lgnd-ttl">産地マーク</div>
    <span class="lb lk">九州</span>
    <span class="lb lh">淡路島</span>
    <span class="lb lboth">九州・淡路島</span>
    <span class="lb ln">新品種</span>
  </div>`;

  let html = leg;
  const cats = tab === 'all' ? CATS : [tab];

  cats.forEach(cat => {
    const items = DB.filter(v => v.cat === cat);
    if (!items.length && tab !== 'all') {
      html += `<div class="empty"><div class="ei">🌱</div><p>まだ品種がありません。<br>＋ボタンから追加してください。</p></div>`;
      return;
    }
    if (!items.length) return;

    if (cat === 'attention') {
      html += `<div class="att">
        <div class="att-ico">⭐</div>
        <div class="att-txt">
          <h3>これから注目の品種</h3>
          <p>研究・普及が進む新品種や話題の品種。＋ボタンで随時追加できます。</p>
        </div>
      </div>`;
    }

    html += `<div class="cat-sec">
      <div class="cat-hdr">
        <span class="cat-badge" style="background:${COLORS[cat]}">${CNAMES[cat]}</span>
      </div>
      <div class="cat-desc">${CDESCS[cat]}</div>
      ${items.map(cardHtml).join('')}
    </div>`;
  });

  document.getElementById('scroll').innerHTML = html;
  document.getElementById('hdr-sub').textContent = `全${DB.length}品種収録 ／ 九州・淡路島・注目品種`;
}

function setTab(id) {
  tab = id;
  render();
  document.getElementById('scroll').scrollTop = 0;
}

/* ============================================================
   MODAL / ADD
============================================================ */
function openAdd() { document.getElementById('ov-add').classList.add('open'); }
function closeOv(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.ov').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

function pm(s) {
  return (s || '').split(',').map(x => parseInt(x.trim())).filter(n => !isNaN(n) && n >= 1 && n <= 12);
}

function doAdd() {
  const name = document.getElementById('fn').value.trim();
  if (!name) { showToast('品種名を入力してください'); return; }

  const v = {
    id: 'u' + Date.now(),
    cat: document.getElementById('fc').value,
    name,
    maker: document.getElementById('fm').value.trim() || '—',
    origin: document.getElementById('fo').value,
    tags: document.getElementById('ftg').value.split(',').map(s => s.trim()).filter(Boolean),
    sow: pm(document.getElementById('fsow').value),
    trans: pm(document.getElementById('ftr').value),
    harv: pm(document.getElementById('fhv').value),
    wt: document.getElementById('fw').value.trim() || '—',
    stor: document.getElementById('fst').value.trim() || '—',
    taste: 3, easy: 3,
    note: document.getElementById('fnt').value.trim(),
  };

  DB.push(v);
  closeOv('ov-add');

  // フォームリセット
  ['fn','fm','ftg','fsow','ftr','fhv','fw','fst','fnt'].forEach(id => document.getElementById(id).value = '');

  tab = v.cat;
  render();
  showToast(`「${name}」を追加しました！`);
}

/* ============================================================
   TOAST
============================================================ */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

/* ============================================================
   INIT
============================================================ */
render();
</script>
