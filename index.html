<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="玉葱図鑑">
<meta name="theme-color" content="#2d5016">
<title>🧅 玉葱品種図鑑</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* =============================================
   VARIABLES
============================================= */
:root {
  --g1:#2d5016; --g2:#3d6b1e; --g3:#5a9030; --g4:#8aba50;
  --amber:#c8820a; --amber-l:#f5c842; --amber-pale:#fffae8;
  --cream:#faf8f2; --cream2:#f2ebe0; --cream3:#e8dfc8;
  --t1:#1e1e1e; --t2:#4a4535; --t3:#9a9080;
  --bd:rgba(0,0,0,0.09); --sh:0 2px 16px rgba(0,0,0,0.07);
  --r:14px; --rs:10px;
  --orange:#c45520; --teal:#157a5a; --purple:#5040b0;
  --pink:#b84070; --blue:#1a5fa8; --crimson:#8a2020; --gold:#a06010;
  --star:#d4a012;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html { scroll-behavior:smooth; }
body {
  font-family:'Noto Sans JP', sans-serif;
  background:var(--cream);
  color:var(--t1);
  min-height:100vh;
}

/* =============================================
   HEADER
============================================= */
.site-header {
  background:linear-gradient(160deg,#1e3a08 0%,#2d5016 55%,#3a6a1a 100%);
  position:sticky; top:0; z-index:100;
  box-shadow:0 2px 20px rgba(0,0,0,0.25);
}
.site-header::after {
  content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at 90% 0%,rgba(245,200,66,0.08) 0%,transparent 50%);
}
.hdr-inner {
  max-width:1200px; margin:0 auto;
  padding:0 24px;
  display:flex; align-items:center;
  justify-content:space-between;
  height:70px; position:relative; z-index:1;
}
.hdr-brand { display:flex; align-items:center; gap:12px; text-decoration:none; }
.hdr-icon-wrap { width:48px; height:48px; flex-shrink:0; }
.hdr-text {}
.hdr-title {
  font-family:'Noto Serif JP', serif;
  font-size:20px; font-weight:700;
  color:#fff; letter-spacing:.06em; line-height:1.2;
}
.hdr-en { font-size:10px; color:rgba(255,255,255,0.42); letter-spacing:.14em; margin-top:1px; }
.hdr-right { display:flex; align-items:center; gap:10px; }
.hdr-count {
  font-size:12px; color:rgba(255,255,255,0.55);
  background:rgba(255,255,255,0.1);
  border-radius:20px; padding:4px 12px;
}
.btn-add {
  background:rgba(245,200,66,0.2);
  border:1.5px solid rgba(245,200,66,0.45);
  color:var(--amber-l);
  border-radius:22px; padding:9px 18px;
  font-size:13px; font-weight:700;
  cursor:pointer; font-family:'Noto Sans JP',sans-serif;
  display:flex; align-items:center; gap:6px;
  transition:all .15s; white-space:nowrap;
}
.btn-add:hover { background:rgba(245,200,66,0.32); }
.btn-add:active { background:rgba(245,200,66,0.42); }

/* =============================================
   TAB BAR
============================================= */
.tab-bar {
  background:linear-gradient(160deg,#1e3a08 0%,#2d5016 55%,#3a6a1a 100%);
  border-bottom:1px solid rgba(255,255,255,0.1);
  position:sticky; top:70px; z-index:99;
}
.tab-inner {
  max-width:1200px; margin:0 auto;
  padding:0 20px 12px;
  display:flex; gap:6px;
  overflow-x:auto; scrollbar-width:none;
}
.tab-inner::-webkit-scrollbar { display:none; }
.tbtn {
  flex-shrink:0; padding:6px 15px;
  font-size:12.5px; font-weight:500;
  border-radius:22px;
  border:1.5px solid rgba(255,255,255,0.22);
  background:transparent; color:rgba(255,255,255,0.62);
  cursor:pointer; font-family:'Noto Sans JP',sans-serif;
  transition:all .15s;
}
.tbtn:hover { background:rgba(255,255,255,0.12); }
.tbtn.active {
  background:#fff; color:var(--g1);
  border-color:#fff; font-weight:700;
}
.tbtn .cnt {
  display:inline-block;
  background:rgba(255,255,255,0.18);
  font-size:10px; padding:0 5px;
  border-radius:8px; margin-left:3px;
}
.tbtn.active .cnt { background:var(--cream2); color:var(--g2); }

/* =============================================
   MAIN LAYOUT
============================================= */
.main {
  max-width:1200px; margin:0 auto;
  padding:28px 24px 60px;
}

/* =============================================
   LEGEND
============================================= */
.legend {
  display:flex; gap:8px; flex-wrap:wrap;
  align-items:center;
  margin-bottom:24px; padding:12px 16px;
  background:#fff; border-radius:var(--rs);
  border:1px solid var(--bd); box-shadow:var(--sh);
}
.legend-ttl { font-size:11px; color:var(--t3); margin-right:4px; }
.lb { font-size:11.5px; font-weight:500; padding:4px 12px; border-radius:20px; }
.lk  { background:#e8f5e0; color:#2d6a14; border:1px solid #a8d878; }
.lh  { background:#e0eef8; color:#1a4f8a; border:1px solid #78aae0; }
.lboth { background:#ede8f8; color:#3830a0; border:1px solid #a898e8; }
.ln  { background:#fff3e0; color:#a06010; border:1px solid #f0b840; }

/* =============================================
   CATEGORY SECTION
============================================= */
.cat-sec { margin-bottom:36px; }
.cat-hdr { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.cat-badge {
  font-size:12px; font-weight:700;
  padding:5px 16px; border-radius:20px;
  color:#fff; letter-spacing:.03em;
}
.cat-desc {
  font-size:12px; color:var(--t2); line-height:1.8;
  margin-bottom:14px; padding:10px 14px;
  background:rgba(0,0,0,0.025);
  border-radius:var(--rs);
  border-left:3px solid var(--cream3);
}

/* ATTENTION BANNER */
.att-banner {
  background:linear-gradient(135deg,#231000 0%,#5a2800 60%,#7a3800 100%);
  border-radius:var(--r); padding:18px 20px;
  margin-bottom:14px;
  display:flex; align-items:center; gap:14px;
  box-shadow:0 4px 20px rgba(100,40,0,0.2);
}
.att-ico { font-size:32px; flex-shrink:0; }
.att-txt h3 { color:var(--amber-l); font-size:15px; font-weight:700; }
.att-txt p { color:rgba(255,255,255,0.62); font-size:12px; margin-top:3px; line-height:1.6; }

/* =============================================
   CARD GRID
============================================= */
.card-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));
  gap:16px;
}

/* =============================================
   CARD
============================================= */
.card {
  background:#fff; border-radius:var(--r);
  border:1px solid var(--bd);
  padding:18px; box-shadow:var(--sh);
  display:flex; flex-direction:column;
  transition:box-shadow .2s, transform .2s;
}
.card:hover {
  box-shadow:0 6px 28px rgba(0,0,0,0.12);
  transform:translateY(-2px);
}
.card-hdr { display:flex; align-items:flex-start; gap:12px; margin-bottom:14px; }
.onion-svg { width:56px; height:56px; flex-shrink:0; }
.cmeta { flex:1; min-width:0; }
.cnrow { display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
.cname { font-size:16px; font-weight:700; color:var(--t1); }
.ob { font-size:10.5px; font-weight:500; padding:2px 9px; border-radius:20px; }
.ok    { background:#e8f5e0; color:#2d6a14; border:1px solid #a8d878; }
.oh    { background:#e0eef8; color:#1a4f8a; border:1px solid #78aae0; }
.oboth { background:#ede8f8; color:#3830a0; border:1px solid #a898e8; }
.on    { background:#fff3e0; color:#a06010; border:1px solid #f0b840; }
.cmkr  { font-size:11.5px; color:var(--t3); margin-top:3px; }
.tagrow { display:flex; flex-wrap:wrap; gap:4px; margin-top:8px; }
.tag {
  font-size:11px; padding:2px 8px; border-radius:6px;
  background:var(--cream2); color:var(--t2);
  border:1px solid rgba(0,0,0,0.07);
}

/* CALENDAR */
.cal { margin-bottom:12px; }
.cl-lbl { font-size:10.5px; color:var(--t3); margin-bottom:4px; }
.cl-grid { display:grid; grid-template-columns:repeat(12,1fr); gap:2px; }
.cl-m { font-size:9px; color:var(--t3); text-align:center; padding-bottom:2px; }
.cl-b { height:10px; border-radius:2px; background:#eee; }
.cs { background:var(--orange); }
.ct { background:var(--teal); }
.ch { background:var(--purple); }
.cl-leg { display:flex; gap:14px; margin-top:6px; }
.cli { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--t2); }
.cld { width:10px; height:10px; border-radius:2px; flex-shrink:0; }

/* FEAT */
.feat-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
.fbox { background:var(--cream2); border-radius:var(--rs); padding:8px 12px; text-align:center; }
.flbl { font-size:10.5px; color:var(--t3); }
.fval { font-size:13px; font-weight:700; color:var(--t1); margin-top:2px; }
.rrow { display:flex; gap:20px; margin-bottom:9px; }
.stars { color:var(--star); font-size:13px; letter-spacing:1px; }
.cnote { font-size:12px; color:var(--t2); line-height:1.8; }

/* =============================================
   EMPTY STATE
============================================= */
.empty {
  text-align:center; padding:60px 20px;
  color:var(--t3); grid-column:1/-1;
}
.empty .ei { font-size:56px; margin-bottom:14px; }
.empty p { font-size:14px; line-height:1.75; }

/* =============================================
   MODAL OVERLAY
============================================= */
.ov {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.5); z-index:500;
  align-items:center; justify-content:center;
  padding:20px;
}
.ov.open { display:flex; }

/* MODAL BOX (PC: center dialog / SP: bottom sheet) */
.modal-box {
  background:#fff;
  border-radius:20px;
  width:100%; max-width:560px;
  max-height:90vh; overflow-y:auto;
  padding:32px 28px 36px;
  box-shadow:0 20px 60px rgba(0,0,0,0.25);
  position:relative;
}
.modal-close {
  position:absolute; top:18px; right:20px;
  background:var(--cream2); border:none;
  width:32px; height:32px; border-radius:50%;
  font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  color:var(--t2); transition:background .15s;
}
.modal-close:hover { background:var(--cream3); }
.modal-title { font-size:19px; font-weight:700; margin-bottom:20px; color:var(--t1); }
.fg { margin-bottom:15px; }
.flb { font-size:12.5px; font-weight:500; color:var(--t2); margin-bottom:5px; display:block; }
.fi, .fs, .fta {
  width:100%; padding:11px 13px;
  border:1.5px solid var(--bd); border-radius:var(--rs);
  font-size:14px; font-family:'Noto Sans JP',sans-serif;
  background:#fff; color:var(--t1);
  outline:none; transition:border-color .15s;
  -webkit-appearance:none;
}
.fi:focus, .fs:focus, .fta:focus { border-color:var(--g3); }
.fta { resize:vertical; min-height:80px; line-height:1.7; }
.frow { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.btn-submit {
  width:100%; padding:14px;
  background:var(--g1); color:#fff; border:none;
  border-radius:var(--rs); font-size:15px; font-weight:700;
  font-family:'Noto Sans JP',sans-serif;
  cursor:pointer; margin-top:8px; transition:background .15s;
}
.btn-submit:hover { background:var(--g2); }
.btn-submit:active { background:var(--g3); }
.btn-cancel {
  width:100%; padding:12px; background:transparent;
  color:var(--t2); border:1.5px solid var(--bd);
  border-radius:var(--rs); font-size:14px;
  font-family:'Noto Sans JP',sans-serif;
  cursor:pointer; margin-top:10px;
  transition:background .15s;
}
.btn-cancel:hover { background:var(--cream2); }

/* =============================================
   TOAST
============================================= */
.toast {
  position:fixed; bottom:32px; left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--g1); color:#fff;
  padding:12px 24px; border-radius:32px;
  font-size:13.5px; font-weight:500; z-index:999;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap; pointer-events:none;
  box-shadow:0 6px 24px rgba(0,0,0,0.22);
}
.toast.show { transform:translateX(-50%) translateY(0); }

/* =============================================
   RESPONSIVE — MOBILE
============================================= */
@media (max-width:640px) {
  .hdr-inner { padding:0 16px; height:62px; }
  .hdr-title { font-size:17px; }
  .hdr-icon-wrap { width:42px; height:42px; }
  .hdr-count { display:none; }
  .btn-add { padding:8px 14px; font-size:12px; }
  .tab-bar { top:62px; }
  .tab-inner { padding:0 12px 10px; gap:5px; }
  .main { padding:18px 12px 50px; }
  .card-grid { grid-template-columns:1fr; gap:12px; }
  .legend { margin-bottom:16px; }

  /* Mobile: modal as bottom sheet */
  .ov { padding:0; align-items:flex-end; }
  .modal-box {
    border-radius:22px 22px 0 0;
    max-height:93dvh; padding:24px 18px 36px;
    max-width:100%;
  }
  .modal-close { display:none; }
  .modal-box::before {
    content:''; display:block;
    width:40px; height:4px; background:#ddd;
    border-radius:2px; margin:0 auto 18px;
  }

  .toast { bottom:24px; font-size:13px; }
}

@media (min-width:641px) and (max-width:900px) {
  .card-grid { grid-template-columns:repeat(2, 1fr); }
}

@media (min-width:901px) {
  .card-grid { grid-template-columns:repeat(3, 1fr); }
}
</style>
</head>
<body>

<!-- ===================== HEADER ===================== -->
<header class="site-header">
  <div class="hdr-inner">
    <div class="hdr-brand">
      <!-- かわいい玉葱アイコン -->
      <div class="hdr-icon-wrap">
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" width="48" height="48">
          <circle cx="24" cy="24" r="23" fill="#3d7020"/>
          <ellipse cx="15" cy="11" rx="7" ry="4" fill="rgba(255,255,255,0.1)"/>
          <path d="M24 19 Q19 10 17 4" stroke="#7acc40" stroke-width="2.6" fill="none" stroke-linecap="round"/>
          <path d="M24 19 Q29 10 31 4" stroke="#7acc40" stroke-width="2.6" fill="none" stroke-linecap="round"/>
          <path d="M24 19 Q24 11 24 5" stroke="#5ab030" stroke-width="2.2" fill="none" stroke-linecap="round"/>
          <ellipse cx="24" cy="33" rx="15" ry="13" fill="#f5c842"/>
          <ellipse cx="24" cy="32" rx="12" ry="10.5" fill="#e8a810" opacity="0.55"/>
          <path d="M11 24 Q10 33 12 43" stroke="#c88a08" stroke-width="0.9" fill="none" opacity="0.45"/>
          <path d="M37 24 Q38 33 36 43" stroke="#c88a08" stroke-width="0.9" fill="none" opacity="0.45"/>
          <ellipse cx="19.5" cy="31" rx="2.1" ry="2.3" fill="#2a1500"/>
          <ellipse cx="28.5" cy="31" rx="2.1" ry="2.3" fill="#2a1500"/>
          <circle cx="20.4" cy="30.1" r="0.75" fill="#fff"/>
          <circle cx="29.4" cy="30.1" r="0.75" fill="#fff"/>
          <path d="M20 37 Q24 40.5 28 37" stroke="#2a1500" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <ellipse cx="16.5" cy="35.5" rx="2.6" ry="1.6" fill="#ff7777" opacity="0.35"/>
          <ellipse cx="31.5" cy="35.5" rx="2.6" ry="1.6" fill="#ff7777" opacity="0.35"/>
          <line x1="20.5" y1="45.5" x2="19.5" y2="47.5" stroke="#8a6010" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="24" y1="46.5" x2="24" y2="48.5" stroke="#8a6010" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="27.5" y1="45.5" x2="28.5" y2="47.5" stroke="#8a6010" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="hdr-text">
        <div class="hdr-title">玉葱品種図鑑</div>
        <div class="hdr-en">TAMANEGI ZUKAN</div>
      </div>
    </div>
    <div class="hdr-right">
      <div class="hdr-count" id="hdr-count">全0品種</div>
      <button class="btn-add" onclick="openAdd()">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v11M1 6.5h11" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
        品種を追加
      </button>
    </div>
  </div>
</header>

<!-- ===================== TAB BAR ===================== -->
<nav class="tab-bar">
  <div class="tab-inner" id="tabs"></div>
</nav>

<!-- ===================== MAIN ===================== -->
<main class="main" id="main"></main>

<!-- ===================== ADD MODAL ===================== -->
<div class="ov" id="ov-add">
  <div class="modal-box">
    <button class="modal-close" onclick="closeOv('ov-add')">✕</button>
    <div class="modal-title">✏️ 新しい品種を追加</div>
    <div class="fg">
      <label class="flb">品種名 *</label>
      <input class="fi" id="fn" placeholder="例：泉州中高黄" type="text">
    </div>
    <div class="frow">
      <div class="fg">
        <label class="flb">種苗会社・育成元</label>
        <input class="fi" id="fm" placeholder="例：タキイ種苗" type="text">
      </div>
      <div class="fg">
        <label class="flb">早晩性 *</label>
        <select class="fs" id="fc">
          <option value="chokugokuwase">超極早生</option>
          <option value="gokuwase">極早生</option>
          <option value="wase">早生</option>
          <option value="nakate" selected>中生</option>
          <option value="okute">晩生</option>
          <option value="red">赤玉ねぎ</option>
          <option value="attention">⭐ 注目品種</option>
        </select>
      </div>
    </div>
    <div class="frow">
      <div class="fg">
        <label class="flb">産地</label>
        <select class="fs" id="fo">
          <option value="kyushu">九州</option>
          <option value="hyogo">淡路島</option>
          <option value="both">九州・淡路島</option>
          <option value="new">新品種</option>
        </select>
      </div>
      <div class="fg">
        <label class="flb">平均球重</label>
        <input class="fi" id="fw" placeholder="例：300g前後" type="text">
      </div>
    </div>
    <div class="frow">
      <div class="fg">
        <label class="flb">播種月（例: 8,9）</label>
        <input class="fi" id="fsow" type="text" inputmode="numeric">
      </div>
      <div class="fg">
        <label class="flb">定植月（例: 11,12）</label>
        <input class="fi" id="ftr" type="text" inputmode="numeric">
      </div>
    </div>
    <div class="frow">
      <div class="fg">
        <label class="flb">収穫月（例: 5,6）</label>
        <input class="fi" id="fhv" type="text" inputmode="numeric">
      </div>
      <div class="fg">
        <label class="flb">貯蔵期間</label>
        <input class="fi" id="fst" placeholder="例：〜12月" type="text">
      </div>
    </div>
    <div class="fg">
      <label class="flb">タグ（カンマ区切り）</label>
      <input class="fi" id="ftg" placeholder="例：病気に強い,大玉,甘み強い" type="text">
    </div>
    <div class="fg">
      <label class="flb">特徴・メモ</label>
      <textarea class="fta" id="fnt" placeholder="品種の特徴、栽培ポイントなど"></textarea>
    </div>
    <button class="btn-submit" onclick="doAdd()">図鑑に追加する</button>
    <button class="btn-cancel" onclick="closeOv('ov-add')">キャンセル</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   DATA
============================================================ */
const COLORS = {
  chokugokuwase:'#b84070', gokuwase:'#c45520', wase:'#157a5a',
  nakate:'#1a5fa8', okute:'#5040b0', red:'#8a2020', attention:'#a06010'
};
const CNAMES = {
  chokugokuwase:'超極早生', gokuwase:'極早生', wase:'早生',
  nakate:'中生', okute:'晩生', red:'赤玉ねぎ', attention:'⭐ 注目品種'
};
const CDESCS = {
  chokugokuwase:'最も早い品種群。真冬でも生長する特殊な性質を持ち、九州など温暖地で活用される。',

let tab = 'all';

/* ============================================================
   HELPERS
============================================================ */
const strs = n => '★'.repeat(n) + '☆'.repeat(5 - n);

function onionChar(color, isRed) {
  const c = isRed ? '#c03060' : color;
  const ci = isRed ? '#902040' : color;
  return `<svg class="onion-svg" viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">

    <path d="M28 20 Q28 12 28 5" stroke="#3a8010" stroke-width="2" fill="none" stroke-linecap="round"/>
    <ellipse cx="28" cy="37" rx="17" ry="15" fill="${c}" opacity="0.92"/>
    <ellipse cx="28" cy="36" rx="14" ry="12.5" fill="${ci}" opacity="0.42"/>

    <circle cx="35.4" cy="34" r="0.8" fill="#fff"/>
    <path d="M22 41.5 Q28 45.5 34 41.5" stroke="#2a1500" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <ellipse cx="18" cy="40" rx="2.8" ry="1.7" fill="#ff7777" opacity="0.33"/>
    <ellipse cx="38" cy="40" rx="2.8" ry="1.7" fill="#ff7777" opacity="0.33"/>
    <line x1="23" y1="51" x2="22" y2="54" stroke="#8a6010" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="28" y1="52" x2="28" y2="55" stroke="#8a6010" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="33" y1="51" x2="34" y2="54" stroke="#8a6010" stroke-width="1.2" stroke-linecap="round"/>
  </svg>`;
}

function calHtml(s, t, h) {
  let m = '', b = '';
  for (let i = 1; i <= 12; i++) {
    m += `<div class="cl-m">${i}</div>`;
    let c = 'cl-b';
    if (s.includes(i)) c += ' cs';
    else if (t.includes(i)) c += ' ct';
    else if (h.includes(i)) c += ' ch';
    b += `<div class="${c}"></div>`;
  }
  return `<div class="cal">
    <div class="cl-lbl">作付けカレンダー（月）</div>
    <div class="cl-grid">${m}</div>
    <div class="cl-grid" style="margin-top:2px">${b}</div>
    <div class="cl-leg">
      <div class="cli"><div class="cld" style="background:#c45520"></div>播種</div>
      <div class="cli"><div class="cld" style="background:#157a5a"></div>定植</div>
      <div class="cli"><div class="cld" style="background:#5040b0"></div>収穫</div>
    </div>
  </div>`;
}

function cardHtml(v) {
  const isRed = v.cat === 'red';
  const color = COLORS[v.cat] || '#888';
  return `<div class="card">
    <div class="card-hdr">
      ${onionChar(color, isRed)}
      <div class="cmeta">
        <div class="cnrow">
          <span class="cname">${v.name}</span>
          <span class="ob ${OBC[v.origin] || 'on'}">${OBL[v.origin] || '新品種'}</span>
        </div>
        <div class="cmkr">${v.maker || '—'}</div>
        <div class="tagrow">${(v.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      </div>
    </div>
    ${calHtml(v.sow||[], v.trans||[], v.harv||[])}
    <div class="feat-grid">
      <div class="fbox"><div class="flbl">平均球重</div><div class="fval">${v.wt||'—'}</div></div>
      <div class="fbox"><div class="flbl">貯蔵期間</div><div class="fval">${v.stor||'—'}</div></div>
    </div>
    <div class="rrow">
      <div><div class="flbl">食味</div><div class="stars">${strs(v.taste||3)}</div></div>
      <div><div class="flbl">作りやすさ</div><div class="stars">${strs(v.easy||3)}</div></div>
    </div>
    <div class="cnote">${v.note||''}</div>
  </div>`;
}

/* ============================================================
   RENDER
============================================================ */
function render() {
  // Tabs
  const ts = [{id:'all', lbl:'すべて'}, ...CATS.map(c => ({id:c, lbl:CNAMES[c]}))];
  document.getElementById('tabs').innerHTML = ts.map(t => {
    const n = t.id==='all' ? DB.length : DB.filter(v=>v.cat===t.id).length;
    return `<button class="tbtn${t.id===tab?' active':''}" onclick="setTab('${t.id}')">${t.lbl}<span class="cnt">${n}</span></button>`;
  }).join('');

  // Header count
  document.getElementById('hdr-count').textContent = `全 ${DB.length} 品種`;

  // Legend
  const leg = `<div class="legend">
    <span class="legend-ttl">産地マーク：</span>
    <span class="lb lk">九州</span>
    <span class="lb lh">淡路島</span>
    <span class="lb lboth">九州・淡路島</span>
    <span class="lb ln">新品種</span>
  </div>`;

  let html = leg;
  const cats = tab === 'all' ? CATS : [tab];

  cats.forEach(cat => {
    const items = DB.filter(v => v.cat === cat);
    if (!items.length && tab !== 'all') {
      html += `<div class="card-grid"><div class="empty"><div class="ei">🌱</div><p>まだ品種がありません。<br>＋ボタンから追加してください。</p></div></div>`;
      return;
    }
    if (!items.length) return;

    if (cat === 'attention') {
      html += `<div class="att-banner">
        <div class="att-ico">⭐</div>
        <div class="att-txt">
          <h3>これから注目の品種</h3>
          <p>研究・普及が進む新品種や話題の品種。＋ボタンで随時追加できます。</p>
        </div>
      </div>`;
    }

    html += `<div class="cat-sec">
      <div class="cat-hdr">
        <span class="cat-badge" style="background:${COLORS[cat]}">${CNAMES[cat]}</span>
      </div>
      <div class="cat-desc">${CDESCS[cat]}</div>
      <div class="card-grid">
        ${items.map(cardHtml).join('')}
      </div>
    </div>`;
  });

  document.getElementById('main').innerHTML = html;
}

function setTab(id) {
  tab = id;
  render();
  window.scrollTo({ top:0, behavior:'smooth' });
}

/* ============================================================
   MODAL
============================================================ */
function openAdd() { document.getElementById('ov-add').classList.add('open'); }
function closeOv(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.ov').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.ov.open').forEach(el => el.classList.remove('open'));
});

/* ============================================================
   ADD
============================================================ */
function pm(s) {
  return (s||'').split(',').map(x=>parseInt(x.trim())).filter(n=>!isNaN(n)&&n>=1&&n<=12);
}
function doAdd() {
  const name = document.getElementById('fn').value.trim();
  if (!name) { showToast('品種名を入力してください'); return; }
  const v = {
    id: 'u'+Date.now(),
    cat: document.getElementById('fc').value,
    name,
    maker: document.getElementById('fm').value.trim() || '—',
    origin: document.getElementById('fo').value,
    tags: document.getElementById('ftg').value.split(',').map(s=>s.trim()).filter(Boolean),
    sow: pm(document.getElementById('fsow').value),
    trans: pm(document.getElementById('ftr').value),
    harv: pm(document.getElementById('fhv').value),
    wt: document.getElementById('fw').value.trim() || '—',
    stor: document.getElementById('fst').value.trim() || '—',
    taste: 3, easy: 3,
    note: document.getElementById('fnt').value.trim(),
  };
  DB.push(v);
  closeOv('ov-add');
  ['fn','fm','ftg','fsow','ftr','fhv','fw','fst','fnt'].forEach(id => document.getElementById(id).value='');
  tab = v.cat;
  render();
  showToast(`「${name}」を追加しました！`);
}

/* ============================================================
   TOAST
============================================================ */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

/* ============================================================
   INIT
============================================================ */
render();
</script>
